<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootySIMs Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #1a6b1a; color: white; text-align: center; padding: 20px; min-height: 100vh; }
        h1 { font-size: 26px; margin-bottom: 20px; }
        h2 { font-size: 18px; margin-bottom: 12px; }
        button {
            background: white; color: #1a6b1a; padding: 13px 24px;
            margin: 8px 4px; font-size: 16px; font-weight: bold;
            border: none; border-radius: 10px; cursor: pointer; transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        button.danger { background: #ff4444; color: white; }
        .box {
            background: rgba(255,255,255,0.12); padding: 22px;
            margin: 16px auto; max-width: 440px; border-radius: 16px;
        }
        img { max-width: 280px; margin: 16px auto; border: 6px solid white; border-radius: 12px; display: block; }
        select, input {
            padding: 12px; margin: 8px 0; width: 100%;
            font-size: 16px; border-radius: 10px; border: none; color: #333;
        }
        .status-badge {
            display: inline-block; padding: 4px 12px; border-radius: 20px;
            font-size: 13px; font-weight: bold; margin-top: 8px;
        }
        .badge-live { background: #00e676; color: #003300; }
        .badge-demo { background: #ffd600; color: #333; }
        #preview { margin-top: 14px; font-size: 18px; font-weight: bold; min-height: 24px; }
        #qrContainer { min-height: 60px; }
        #usage { margin-top: 10px; font-size: 15px; opacity: 0.9; }
        .divider { border: none; border-top: 1px solid rgba(255,255,255,0.2); margin: 8px 0; }
    </style>
</head>
<body>

```
<h1>⚽ FootySIMs Dashboard</h1>

<!-- User Info -->
<div id="userInfo" class="box">🔄 Loading...</div>

<!-- eSIM QR Box -->
<div class="box">
    <h2>Your Reusable eSIM</h2>
    <div id="qrContainer">
        <p style="opacity:0.8;">Select a country and tap <b>Get My eSIM</b> below</p>
    </div>
    <p id="usage"></p>
</div>

<!-- Pack Selector -->
<div class="box">
    <h2>Choose Your Pack 🌍</h2>
    <select id="country">
        <option value="TH" data-price="4.90" data-gb="5">🇹🇭 Thailand – 5GB $4.90</option>
        <option value="GB" data-price="4.90" data-gb="5">🇬🇧 UK – 5GB $4.90</option>
        <option value="ES" data-price="4.90" data-gb="5">🇪🇸 Spain – 5GB $4.90</option>
        <option value="DE" data-price="4.90" data-gb="5">🇩🇪 Germany – 5GB $4.90</option>
        <option value="IT" data-price="4.90" data-gb="5">🇮🇹 Italy – 5GB $4.90</option>
        <option value="FR" data-price="4.90" data-gb="5">🇫🇷 France – 5GB $4.90</option>
        <option value="US" data-price="4.90" data-gb="5">🇺🇸 USA – 5GB $4.90</option>
        <option value="PT" data-price="3.90" data-gb="4">🇵🇹 Portugal – 4GB $3.90</option>
        <option value="NL" data-price="3.90" data-gb="4">🇳🇱 Netherlands – 4GB $3.90</option>
        <option value="TR" data-price="4.90" data-gb="5">🇹🇷 Turkey – 5GB $4.90</option>
        <option value="BR" data-price="4.90" data-gb="5">🇧🇷 Brazil – 5GB $4.90</option>
        <option value="JP" data-price="5.90" data-gb="5">🇯🇵 Japan – 5GB $5.90</option>
        <option value="AU" data-price="5.90" data-gb="5">🇦🇺 Australia – 5GB $5.90</option>
        <option value="MX" data-price="4.90" data-gb="5">🇲🇽 Mexico – 5GB $4.90</option>
        <option value="ZA" data-price="4.90" data-gb="5">🇿🇦 South Africa – 5GB $4.90</option>
    </select>

    <button onclick="previewPlan()">👀 Preview Pack</button>
    <div id="preview"></div>
</div>

<!-- Action Buttons -->
<div class="box">
    <button onclick="getESIM()">✅ Get My eSIM Now</button>
    <button onclick="topUp()">💳 Top Up Pack</button>
    <hr class="divider">
    <button onclick="window.location.href='howto.html'">📖 How to Use eSIM</button>
    <button onclick="addMate()">👥 Add Mate</button>
    <hr class="divider">
    <button class="danger" onclick="logout()">Logout</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>

<script>
    // ── Firebase Config ──────────────────────────────────────────────
    const firebaseConfig = {
        apiKey: "AIzaSyAbU13lns_T_WCi-TNluGiw06rjMxAUids",
        authDomain: "footysims-43be5.firebaseapp.com",
        projectId: "footysims-43be5",
        storageBucket: "footysims-43be5.firebasestorage.app",
        messagingSenderId: "663997348288",
        appId: "1:663997348288:web:c0c53c5dc32e546add7025"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ── Auth Check ───────────────────────────────────────────────────
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('userInfo').innerHTML =
                `✅ Logged in as <b>${user.email}</b>`;
        } else {
            window.location.href = 'index.html';
        }
    });

    // ── Helpers ──────────────────────────────────────────────────────
    function getSelectedOption() {
        const sel = document.getElementById('country');
        return sel.options[sel.selectedIndex];
    }

    function previewPlan() {
        const opt = getSelectedOption();
        const price = opt.dataset.price;
        const gb    = opt.dataset.gb;
        const label = opt.text;
        document.getElementById('preview').innerHTML =
            `✅ ${label}<br>${gb}GB for <b>$${price}</b> – ready for your trip!`;
    }

    // ── Get eSIM (Demo QR until Zendit/Airhub live) ──────────────────
    function getESIM() {
        const opt     = getSelectedOption();
        const country = opt.value;
        const gb      = opt.dataset.gb;
        const price   = opt.dataset.price;
        const label   = opt.text;

        // TODO: Replace this block with real API call when Zendit/Airhub is live
        const demoData = `FOOTYSIMS-DEMO-${country}-${gb}GB-${Date.now()}`;
        const qrURL    = `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${demoData}`;

        document.getElementById('qrContainer').innerHTML = `
            <img src="${qrURL}" alt="eSIM QR Code">
            <span class="status-badge badge-demo">⚠️ Demo QR — Real eSIM coming soon</span>
            <p style="margin-top:12px; font-size:14px; opacity:0.85;">
                ICCID: DEMO-${Date.now()}<br>
                ${label} | ${gb}GB | $${price}
            </p>
        `;
        document.getElementById('usage').innerHTML = `📶 Data: ${gb}GB — ${label.split('–')[0].trim()}`;
    }

    // ── Top Up ───────────────────────────────────────────────────────
    function topUp() {
        // Live Stripe link — opens checkout
        window.open("https://buy.stripe.com/9B6bJ3giNbAi6RW6jk04800", "_blank");
    }

    // ── Add Mate ─────────────────────────────────────────────────────
    function addMate() {
        alert("Group eSIM sharing coming soon! Your mates will be able to join your plan.");
    }

    // ── Logout ───────────────────────────────────────────────────────
    function logout() {
        auth.signOut().then(() => window.location.href = 'index.html');
    }
</script>
```

</body>
</html>
