<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FootySIMs Dashboard</title>
    <style>
        body { font-family: Arial; background: #228B22; color: white; text-align: center; padding: 20px; }
        button { background: white; color: #228B22; padding: 15px 30px; margin: 10px; font-size: 18px; border: none; border-radius: 8px; }
        .box { background: rgba(255,255,255,0.1); padding: 25px; margin: 20px auto; max-width: 420px; border-radius: 16px; }
        img { max-width: 340px; margin: 20px auto; border: 8px solid white; border-radius: 16px; }
        select, input { padding: 14px; margin: 10px; width: 90%; font-size: 17px; border-radius: 12px; border: none; }
    </style>
</head>
<body>
    <h1>Your FootySIMs Dashboard</h1>
    <div id="userInfo" class="box">Loading...</div>

    <div class="box">
        <h2>Your Reusable eSIM</h2>
        <div id="qrContainer">Tap button to get your Thailand eSIM</div>
        <p id="usage">Data left: 0 GB – top up for Thailand trip</p>
    </div>

    <div class="box">
        <h2>Choose Your Pack 🌍</h2>
        <select id="country">
            <option value="TH">🇹🇭 Thailand (5GB $4.90)</option>
            <option value="US">🇺🇸 USA (5GB $4.90)</option>
            <option value="ES">🇪🇸 Spain (5GB $4.90)</option>
            <option value="DE">🇩🇪 Germany (5GB $4.90)</option>
            <option value="IT">🇮🇹 Italy (5GB $4.90)</option>
            <option value="FR">🇫🇷 France (5GB $4.90)</option>
            <option value="GB">🇬🇧 UK (5GB $4.90)</option>
            <option value="PT">🇵🇹 Portugal (4GB $3.90)</option>
            <option value="NL">🇳🇱 Netherlands (4GB $3.90)</option>
            <option value="TR">🇹🇷 Turkey (5GB $4.90)</option>
            <option value="BR">🇧🇷 Brazil (5GB $4.90)</option>
        </select>
        <input id="gb" type="number" value="5" style="width:80px;">
        <button onclick="previewPlan()">Preview Pack</button>
        <div id="preview" style="margin-top:15px; font-size:19px; font-weight:bold;"></div>
    </div>

    <button onclick="topUp()">Top Up Selected Pack Now</button>
    <button onclick="getRealESIM()">✅ Get My Real Thailand eSIM Now</button>
    <button onclick="window.location.href='howto.html'">📖 How to Use eSIM</button>
    <button onclick="addMate()">Add Mate (Group Travel)</button>
    <button onclick="logout()">Logout</button>

    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyAbU13lns_T_WCi-TNluGiw06rjMxAUids",
          authDomain: "footysims-43be5.firebaseapp.com",
          projectId: "footysims-43be5",
          storageBucket: "footysims-43be5.firebasestorage.app",
          messagingSenderId: "663997348288",
          appId: "1:663997348288:web:c0c53c5dc32e546add7025"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        const ZENDIT_KEY = "prod_f7aa7207-e485-4727-9e4b-0938912309c0699564cbf7a62d0a119fe305";
        const ZENDIT_URL = "https://api.zendit.io";

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('userInfo').innerHTML = `✅ Logged in as <b>${user.email}</b>`;
            } else {
                window.location.href = 'index.html';
            }
        });

        function logout() { auth.signOut().then(() => window.location.href = 'index.html'); }
        function topUp() { window.location.href = "https://buy.stripe.com/9B6bJ3giNbAi6RW6jk04800"; }

        function previewPlan() {
            const countryText = document.getElementById('country').options[document.getElementById('country').selectedIndex].text;
            const gb = document.getElementById('gb').value;
            document.getElementById('preview').innerHTML = `✅ ${countryText}<br>${gb}GB for $${(gb * 0.98).toFixed(2)} – ready for your trip!`;
        }

        async function getRealESIM() {
            document.getElementById('qrContainer').innerHTML = "<p>🔄 Provisioning real Thailand eSIM from Zendit...</p>";

            try {
                const res = await fetch(`${ZENDIT_URL}/esim/purchases`, {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + ZENDIT_KEY,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        offerId: "PASTE_YOUR_TEST_OFFERID_HERE",   // ← REPLACE THIS LINE with the real offerId from Swagger
                        transactionId: "footysims-" + Date.now()
                    })
                });

                const data = await res.json();
                const qrData = data.qrCode || data.iccid || "ESIM-FOOTYSIMS-" + Date.now();
                const qrHTML = `
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=340x340&data=${qrData}" alt="Thailand eSIM QR">
                    <p>✅ Real Thailand eSIM created!<br>ICCID: ${data.iccid || 'Generated'}<br>Scan with your phone → install once, top-up anytime.</p>
                `;
                document.getElementById('qrContainer').innerHTML = qrHTML;
                document.getElementById('usage').innerHTML = 'Data left: 5 GB (Thailand – ready for your trip!)';
            } catch(e) {
                document.getElementById('qrContainer').innerHTML = `<p>❌ ${e.message}<br>Replace the offerId line above with real one from Swagger.</p>`;
            }
        }

        function addMate() { alert("Add mate's email for group eSIM sharing (coming soon)"); }
    </script>
</body>
</html>
