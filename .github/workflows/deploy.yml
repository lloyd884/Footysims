name: Deploy Firebase Functions

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: cd functions && npm install

      - name: Set Zendit API key
        run: |
          npm install -g firebase-tools
          firebase functions:config:set zendit.key="${{ secrets.ZENDIT_KEY }}" --project footysims-43be5 --token "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"

      - name: Deploy Firebase Functions
        run: firebase deploy --only functions --project footysims-43be5 --token "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
